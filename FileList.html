<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Files - Go API Lab</title>
        <style>
            :root {
                --primary: #2563eb;
                --bg: #f8fafc;
                --card-bg: #ffffff;
                --text: #1e293b;
                --text-light: #64748b;
                --border: #e2e8f0;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                background-color: var(--bg);
                color: var(--text);
                margin: 0;
                padding: 2rem;
                display: flex;
                justify-content: center;
            }

            .container {
                width: 100%;
                max-width: 800px;
            }

            header {
                margin-bottom: 2rem;
            }

            h1 {
                font-size: 1.875rem;
                font-weight: 700;
                margin: 0 0 0.5rem 0;
            }

            p.subtitle {
                color: var(--text-light);
                margin: 0;
            }

            .file-list {
                background: var(--card-bg);
                border: 1px solid var(--border);
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            }

            .file-item {
                display: flex;
                align-items: center;
                padding: 1rem 1.5rem;
                border-bottom: 1px solid var(--border);
                transition: background-color 0.2s;
                text-decoration: none;
                color: inherit;
            }

            .file-item:last-child {
                border-bottom: none;
            }

            .file-item:hover {
                background-color: #f1f5f9;
            }

            .file-icon {
                width: 40px;
                height: 40px;
                background: #eff6ff;
                color: var(--primary);
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-right: 1rem;
                font-weight: bold;
            }

            .file-info {
                flex-grow: 1;
            }

            .file-name {
                font-weight: 500;
                display: block;
            }

            .file-meta {
                font-size: 0.875rem;
                color: var(--text-light);
            }

            .badge {
                font-size: 0.75rem;
                padding: 0.25rem 0.5rem;
                border-radius: 9999px;
                background: #f1f5f9;
                color: var(--text-light);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>Files</h1>
                <p class="subtitle">Index of available files</p>
            </header>

            <div class="file-list">{{files}}</div>
        </div>
    </body>
</html>
