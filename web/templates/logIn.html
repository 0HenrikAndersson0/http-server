<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login - Go API Lab</title>
        <style>
            :root {
                --primary: #2563eb;
                --primary-hover: #1d4ed8;
                --bg: #f8fafc;
                --card-bg: #ffffff;
                --text: #1e293b;
                --text-light: #64748b;
                --border: #e2e8f0;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                background-color: var(--bg);
                color: var(--text);
                margin: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
            }

            .login-card {
                background: var(--card-bg);
                padding: 2.5rem;
                border-radius: 12px;
                box-shadow:
                    0 4px 6px -1px rgb(0 0 0 / 0.1),
                    0 2px 4px -2px rgb(0 0 0 / 0.1);
                border: 1px solid var(--border);
                width: 100%;
                max-width: 400px;
            }

            header {
                text-align: center;
                margin-bottom: 2rem;
            }

            h1 {
                font-size: 1.5rem;
                font-weight: 700;
                margin: 0 0 0.5rem 0;
            }

            p {
                color: var(--text-light);
                font-size: 0.875rem;
                margin: 0;
            }

            .form-group {
                margin-bottom: 1.25rem;
            }

            label {
                display: block;
                font-size: 0.875rem;
                font-weight: 500;
                margin-bottom: 0.5rem;
            }

            input {
                width: 100%;
                padding: 0.75rem;
                border: 1px solid var(--border);
                border-radius: 6px;
                font-size: 1rem;
                box-sizing: border-box;
                transition:
                    border-color 0.2s,
                    ring 0.2s;
            }

            input:focus {
                outline: none;
                border-color: var(--primary);
                box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            }

            button {
                width: 100%;
                padding: 0.75rem;
                background-color: var(--primary);
                color: white;
                border: none;
                border-radius: 6px;
                font-size: 1rem;
                font-weight: 600;
                cursor: pointer;
                transition: background-color 0.2s;
                margin-top: 1rem;
            }

            button:hover {
                background-color: var(--primary-hover);
            }
        </style>
    </head>
    <body>
        <div class="login-card">
            <header>
                <h1>Login</h1>
                <p>Please enter your credentials to login</p>
            </header>

            <form action="/login" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        required
                        autocomplete="username"
                    />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        autocomplete="current-password"
                    />
                </div>

                <button type="submit">Login</button>
            </form>
        </div>
    </body>
</html>
